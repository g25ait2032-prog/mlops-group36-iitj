name: CI

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main, develop]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        run: |
          flake8 src \
            --max-line-length=120 \
            --ignore=E203,E221,E261,E302,W291,W293,W391,F401

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest -v || [ $? -eq 5 ]
          else
            echo "No tests directory found. Skipping tests."
          fi
