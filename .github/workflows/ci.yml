name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: python -m pip install --upgrade pip

      - run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        run: |
          flake8 src --max-line-length=120 --statistics --show-source

      - name: Test
        run: |
          pytest -v
