name: Spam Classification Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: "Message to classify as Ham or Spam"
        required: true
        default: "URGENT! You have won a 1-week cruise! Call 090xxx to claim now!"

permissions:
  contents: read
  packages: write

jobs:
  inference:
    runs-on: ubuntu-latest

    env:
      HF_MODEL: nagaananth/MLOPS_group-v2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/g25ait2032-prog/mlops_group-inference:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HF_MODEL_NAME=${{ env.HF_MODEL }}

      - name: Run Inference Container
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_gr }}
          HF_MODEL: ${{ env.HF_MODEL }}
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
        run: |
          docker run --rm \
            -e HF_TOKEN="$HF_TOKEN" \
            -e HF_MODEL="$HF_MODEL" \
            -e INPUT_TEXT="$INPUT_TEXT" \
            ghcr.io/g25ait2032-prog/mlops_group-inference:latest
